<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramacon – Dados Cadastrais</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0d1f4c;
    --navy2:  #112360;
    --panel:  #162a6e;
    --row:    #1a3080;
    --gold:   #e8b922;
    --gold2:  #f5d060;
    --white:  #ffffff;
    --muted:  #a0b4d8;
  }

  body {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow', sans-serif;
    padding: 24px 16px;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--navy2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(232,185,34,.18);
    animation: rise .6s cubic-bezier(.22,1,.36,1);
  }

  @keyframes rise {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Header ── */
  .header {
    background: var(--panel);
    padding: 28px 32px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 2px solid rgba(232,185,34,.25);
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: .14em;
    color: var(--gold);
    line-height: 1;
  }

  .header-text p {
    font-size: .78rem;
    letter-spacing: .18em;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .logo-box {
    text-align: right;
    flex-shrink: 0;
  }

  .logo-box .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: .1em;
    line-height: 1;
  }

  .logo-box .sub {
    font-size: .58rem;
    letter-spacing: .22em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo-box .tagline {
    font-size: .55rem;
    color: rgba(160,180,216,.6);
    letter-spacing: .1em;
    margin-top: 2px;
  }

  /* ── Form rows ── */
  .form-body { padding: 0 0 8px; }

  .field-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    border-bottom: 1px solid rgba(255,255,255,.06);
    transition: background .2s;
  }

  .field-row:hover { background: rgba(255,255,255,.03); }

  .field-label {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .16em;
    color: var(--gold);
    text-transform: uppercase;
    border-right: 1px solid rgba(232,185,34,.15);
    background: rgba(232,185,34,.04);
  }

  .field-input {
    padding: 10px 20px;
    display: flex;
    align-items: center;
  }

  .field-input input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: .95rem;
    font-weight: 300;
    letter-spacing: .04em;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }

  .field-input input::placeholder { color: rgba(160,180,216,.45); }

  .field-input input:focus {
    border-bottom-color: var(--gold);
  }

  /* ── Footer action ── */
  .footer {
    padding: 24px 32px 28px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,.07);
  }

  .footer .caption {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .1em;
    margin-bottom: 16px;
  }

  .btn-send {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #25d366 0%, #1aab52 100%);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(37,211,102,.35);
    transition: transform .18s, box-shadow .18s;
  }

  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(37,211,102,.5);
  }

  .btn-send:active { transform: translateY(0); }

  .btn-send svg { width: 20px; height: 20px; fill: currentColor; }

  .brand-footer {
    margin-top: 18px;
    font-size: .68rem;
    color: rgba(160,180,216,.5);
    letter-spacing: .08em;
  }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .field-row { grid-template-columns: 1fr; }
    .field-label { border-right: none; border-bottom: 1px solid rgba(232,185,34,.12); padding: 10px 16px 6px; }
    .field-input { padding: 6px 16px 12px; }
    .header { flex-direction: column; }
    .logo-box { text-align: left; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="header-text">
      <h1>Dados Cadastrais</h1>
      <p>Para faturamento e cadastro</p>
    </div>
    <div class="logo-box">
      <div class="brand">RAMACON</div>
      <div class="sub">Distribuidora</div>
      <div class="tagline">Material Elétrico · Hidráulico · Ferragens em Geral</div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-body">

    <div class="field-row">
      <div class="field-label">Razão Social</div>
      <div class="field-input">
        <input id="razao" type="text" placeholder="Nome da empresa" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">CNPJ</div>
      <div class="field-input">
        <input id="cnpj" type="text" placeholder="00.000.000/0001-00" maxlength="18" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">Insc. Estadual</div>
      <div class="field-input">
        <input id="ie" type="text" placeholder="000.000.000.000" maxlength="18" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">E-mail</div>
      <div class="field-input">
        <input id="email" type="email" placeholder="contato@empresa.com.br" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">RG Proprietário</div>
      <div class="field-input">
        <input id="rg" type="text" placeholder="0000000000-0  SSP/CE" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">WhatsApp 1</div>
      <div class="field-input">
        <input id="wpp1" type="tel" placeholder="(85) 99999-0000  (Comercial)" />
      </div>
    </div>

    <div class="field-row">
      <div class="field-label">WhatsApp 2</div>
      <div class="field-input">
        <input id="wpp2" type="tel" placeholder="(85) 99999-0000  (Financeiro)" />
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p class="caption">Ramacon Distribuidora · Material Elétrico · Hidráulico · Ferragens em Geral</p>

    <button class="btn-send" onclick="enviarWhatsApp()">
      <!-- WhatsApp icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pelo WhatsApp
    </button>

    <p class="brand-footer">Ramacon Distribuidora</p>
  </div>

</div>

<script>
  /* ── Máscara de CNPJ ── */
  document.getElementById('cnpj').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g,'').slice(0,14);
    v = v.replace(/^(\d{2})(\d)/,'$1.$2');
    v = v.replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3');
    v = v.replace(/\.(\d{3})(\d)/,'.$1/$2');
    v = v.replace(/(\d{4})(\d)/,'$1-$2');
    e.target.value = v;
  });

  /* ── Máscara de IE ── */
  document.getElementById('ie').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g,'').slice(0,12);
    v = v.replace(/^(\d{3})(\d)/,'$1.$2');
    v = v.replace(/^(\d{3})\.(\d{3})(\d)/,'$1.$2.$3');
    v = v.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3.$4');
    e.target.value = v;
  });

  /* ── Envio via WhatsApp ── */
  function enviarWhatsApp() {
    const razao = document.getElementById('razao').value.trim();
    const cnpj  = document.getElementById('cnpj').value.trim();
    const ie    = document.getElementById('ie').value.trim();
    const email = document.getElementById('email').value.trim();
    const rg    = document.getElementById('rg').value.trim();
    const wpp1  = document.getElementById('wpp1').value.trim();
    const wpp2  = document.getElementById('wpp2').value.trim();

    if (!razao || !cnpj) {
      alert('Por favor, preencha ao menos a Razão Social e o CNPJ antes de enviar.');
      return;
    }

    const msg =
`🏠 *RAMACON – DADOS CADASTRAIS*
────────────────────────
*Razão Social:* ${razao || '–'}
*CNPJ:* ${cnpj || '–'}
*Insc. Estadual:* ${ie || '–'}
*E-mail:* ${email || '–'}
*RG Proprietário:* ${rg || '–'}
*WhatsApp 1:* ${wpp1 || '–'}
*WhatsApp 2:* ${wpp2 || '–'}
────────────────────────
_Enviado via formulário de cadastro Ramacon_`;

    /* ── Substitua pelo número real da Ramacon (código do país + DDD + número) ── */
    const numero = '5585992124311';

    const url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }
</script>

</body>
</html>
